# SwiftLint Configuration - Recommended iOS Rules

# Paths to include
included:
  - Rentia

# Paths to exclude
excluded:
  - Pods
  - Carthage
  - .build
  - DerivedData
  - vendor

# Rules configuration
disabled_rules:
  - todo # Allow TODO/FIXME comments during development

opt_in_rules:
  # Performance
  - empty_count
  - empty_string
  - first_where
  - last_where
  - sorted_first_last
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - flatmap_over_map_reduce
  - reduce_boolean
  - reduce_into

  # Style
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - literal_expression_end_indentation
  - modifier_order
  - multiline_arguments
  - multiline_literal_brackets
  - multiline_parameters
  - operator_usage_whitespace
  - prefer_self_in_static_references
  - redundant_nil_coalescing
  - redundant_type_annotation
  - return_value_from_void_function
  - single_test_class
  - sorted_imports
  - trailing_comma
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces

  # Safety
  - force_unwrapping
  - implicitly_unwrapped_optional
  - overridden_super_call
  - prohibited_super_call
  - strong_iboutlet
  - unowned_variable_capture

  # Readability
  - attributes
  - joined_default_parameter
  - superfluous_else
  - yoda_condition

# Rule settings
line_length:
  warning: 120
  error: 200
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 400
  error: 1000

type_body_length:
  warning: 250
  error: 500

function_body_length:
  warning: 40
  error: 100

function_parameter_count:
  warning: 5
  error: 8

type_name:
  min_length: 3
  max_length: 50

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - i
    - j
    - x
    - y
    - z

nesting:
  type_level: 3
  function_level: 5

trailing_comma:
  mandatory_comma: true

force_unwrapping:
  severity: warning

vertical_whitespace:
  max_empty_lines: 1

reporter: xcode
