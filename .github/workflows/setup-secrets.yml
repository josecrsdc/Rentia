name: Configurar Secrets desde Mac

# Corre en tu Mac (self-hosted runner) y extrae automáticamente:
#   - Certificado de distribución del Keychain
#   - Provisioning profile de ~/Library/MobileDevice/Provisioning Profiles
#   - App Store Connect API Key de ~/.appstoreconnect/private_keys
# y los sube como secrets al repositorio.
#
# REQUISITOS PREVIOS (una sola vez):
#   1. Registrar tu Mac como self-hosted runner:
#      GitHub → Settings → Actions → Runners → New self-hosted runner → macOS
#   2. Autenticar gh CLI en el Mac: `gh auth login`
#   3. Descargar tu ASC API Key (.p8) en ~/.appstoreconnect/private_keys/
#   4. Tener el Provisioning Profile de App Store instalado en el Mac
#      (Xcode → Settings → Accounts → Download Manual Profiles)

on:
  workflow_dispatch:
    inputs:
      asc_key_id:
        description: 'App Store Connect Key ID (ej. ABC123XYZ4)'
        required: true
      asc_issuer_id:
        description: 'App Store Connect Issuer ID (UUID)'
        required: true

jobs:
  setup-secrets:
    name: Extraer y subir secrets
    runs-on: mac-local

    steps:
      - name: Certificado de distribución → BUILD_CERTIFICATE_BASE64 + PASSWORD
        run: |
          export PATH="/usr/local/bin:/opt/homebrew/bin:$PATH"

          CERT_PASS=$(openssl rand -base64 32)
          TMP_CERT=/tmp/rentia_distribution.p12

          # Exporta todas las identidades de distribución del keychain de login
          security export \
            -k ~/Library/Keychains/login.keychain-db \
            -t identities \
            -f pkcs12 \
            -P "$CERT_PASS" \
            -o "$TMP_CERT"

          if [ ! -s "$TMP_CERT" ]; then
            echo "❌ No se encontró ningún certificado de distribución en el Keychain."
            exit 1
          fi

          gh secret set BUILD_CERTIFICATE_BASE64 \
            --body "$(base64 -i "$TMP_CERT")"
          gh secret set BUILD_CERTIFICATE_PASSWORD \
            --body "$CERT_PASS"
          gh secret set KEYCHAIN_PASSWORD \
            --body "$(openssl rand -base64 32)"

          rm -f "$TMP_CERT"
          echo "✅ Certificado configurado"

      - name: Provisioning Profile → PROVISIONING_PROFILE_BASE64 + NAME
        run: |
          export PATH="/usr/local/bin:/opt/homebrew/bin:$PATH"

          BUNDLE_ID="com.jose.Rentia"
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          FOUND=false

          for profile in "$PROFILES_DIR"/*.mobileprovision; do
            [ -f "$profile" ] || continue

            # Decodifica el perfil y extrae el bundle ID
            DECODED=$(security cms -D -i "$profile" 2>/dev/null)
            APP_ID=$(echo "$DECODED" | plutil -extract 'Entitlements.application-identifier' raw - 2>/dev/null || true)

            if [[ "$APP_ID" == *"$BUNDLE_ID"* ]]; then
              PROFILE_NAME=$(echo "$DECODED" | plutil -extract 'Name' raw -)
              PROFILE_TYPE=$(echo "$DECODED" | plutil -extract 'ProvisionsAllDevices' raw - 2>/dev/null || echo "adhoc")

              # Solo usar perfiles de App Store (no development ni ad-hoc)
              PROVISIONS_ALL=$(echo "$DECODED" | plutil -extract 'ProvisionsAllDevices' raw - 2>/dev/null || echo "false")
              ENTITLEMENTS=$(echo "$DECODED" | plutil -extract 'Entitlements.get-task-allow' raw - 2>/dev/null || echo "false")
              if [[ "$ENTITLEMENTS" == "true" ]]; then
                # Es un perfil de Development, saltarlo
                continue
              fi

              gh secret set PROVISIONING_PROFILE_BASE64 \
                --body "$(base64 -i "$profile")"
              gh secret set PROVISIONING_PROFILE_NAME \
                --body "$PROFILE_NAME"

              echo "✅ Perfil encontrado: $PROFILE_NAME"
              FOUND=true
              break
            fi
          done

          if [ "$FOUND" = false ]; then
            echo "❌ No se encontró ningún perfil de App Store para $BUNDLE_ID"
            echo "   Ve a Xcode → Settings → Accounts → Download Manual Profiles"
            exit 1
          fi

      - name: Team ID → DEVELOPMENT_TEAM
        run: |
          export PATH="/usr/local/bin:/opt/homebrew/bin:$PATH"
          gh secret set DEVELOPMENT_TEAM --body "5DVZ6D5ZG2"
          echo "✅ Team ID configurado"

      - name: ASC API Key → ASC_KEY_ID + ASC_ISSUER_ID + ASC_KEY_CONTENT
        run: |
          export PATH="/usr/local/bin:/opt/homebrew/bin:$PATH"

          KEY_ID="${{ inputs.asc_key_id }}"
          KEY_FILE="$HOME/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8"

          if [ ! -f "$KEY_FILE" ]; then
            echo "❌ No se encontró la clave en: $KEY_FILE"
            echo "   Descárgala desde App Store Connect → Usuarios → Claves API"
            exit 1
          fi

          gh secret set ASC_KEY_ID \
            --body "$KEY_ID"
          gh secret set ASC_ISSUER_ID \
            --body "${{ inputs.asc_issuer_id }}"
          gh secret set ASC_KEY_CONTENT \
            --body "$(base64 -i "$KEY_FILE")"

          echo "✅ App Store Connect API Key configurada"

      - name: Resumen
        run: |
          echo ""
          echo "🎉 Todos los secrets configurados:"
          echo "   BUILD_CERTIFICATE_BASE64"
          echo "   BUILD_CERTIFICATE_PASSWORD"
          echo "   KEYCHAIN_PASSWORD"
          echo "   PROVISIONING_PROFILE_BASE64"
          echo "   PROVISIONING_PROFILE_NAME"
          echo "   DEVELOPMENT_TEAM"
          echo "   ASC_KEY_ID"
          echo "   ASC_ISSUER_ID"
          echo "   ASC_KEY_CONTENT"
          echo ""
          echo "Ya puedes lanzar 'Deploy to TestFlight' eligiendo cualquier rama."
